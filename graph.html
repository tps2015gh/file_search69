<!DOCTYPE html>
<html>
<head>
    <title>File Search 69 MVP</title>
    <!-- Use vis-network standalone -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #1e1e1e; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #mynetwork { 
            width: 100vw; 
            height: 100vh; 
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div id="hud">
    <h2 style="margin:0 0 10px 0; color: #0078D7;">File Search 69</h2>
    <p style="margin:0; font-size: 14px;">Core MVP - Vis.js Physics Engine</p>
</div>

<div id="mynetwork"></div>

<script type="text/javascript">
    function renderGraph(nodesData, edgesData) {
        // Wait if the remote vis.js script is still downloading
        if (typeof vis === 'undefined') {
            document.getElementById('mynetwork').innerHTML = '<div style="padding: 50px; color: #0078D7;">Downloading physics engine (vis.js)... please wait a moment.</div>';
            setTimeout(function() { renderGraph(nodesData, edgesData); }, 500);
            return;
        }
        
        // Clear loading message
        document.getElementById('mynetwork').innerHTML = '';
        
        var container = document.getElementById('mynetwork');
        
        var data = {
            nodes: new vis.DataSet(nodesData),
            edges: new vis.DataSet(edgesData)
        };
        
        var options = {
            nodes: {
                shape: 'dot',
                size: 15,
                font: { 
                    color: '#ffffff', 
                    size: 12,
                    face: 'Segoe UI'
                },
                color: { 
                    background: '#0078D7', 
                    border: '#005A9E',
                    highlight: { background: '#ff9900', border: '#cc7a00' },
                    hover: { background: '#3399ff', border: '#0078D7' }
                },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                color: { color: '#555555', highlight: '#ff9900' },
                smooth: { type: 'continuous' },
                width: 1
            },
            physics: {
                solver: 'barnesHut',
                barnesHut: {
                    gravitationalConstant: -2000,
                    centralGravity: 0.1,
                    springLength: 100,
                    springConstant: 0.04,
                    damping: 0.2, // Lowered to allow a natural dance
                    avoidOverlap: 0 
                },
                stabilization: false // Set to false to show the live arranging animation
            },
            interaction: {
                hover: true,
                tooltipDelay: 200,
                zoomView: true,
                dragView: true
            }
        };
        
        var network = new vis.Network(container, data, options);
        
        var physicsTimer = null;
        
        // Function to lock physics to guarantee stability
        function lockPhysics() {
            network.setOptions({ physics: { enabled: false } });
        }
        
        // Initial load: Let the nodes dance and arrange live for 12 seconds, then lock
        physicsTimer = setTimeout(lockPhysics, 12000);
        
        // When dragging starts, wake up the physics smoothly
        network.on("dragStart", function(params) {
            if (params.nodes.length > 0) {
                clearTimeout(physicsTimer);
                network.setOptions({ physics: { enabled: true } });
            }
        });
        
        // When dropping the node, let it dance smoothly into place for 5 seconds, then lock
        network.on("dragEnd", function(params) {
            clearTimeout(physicsTimer);
            physicsTimer = setTimeout(lockPhysics, 5000);
        });
    }
</script>
</body>
</html>
