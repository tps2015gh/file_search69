<!DOCTYPE html>
<html>
<head>
    <title>File Search 69 MVP</title>
    <!-- Use vis-network standalone -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #1e1e1e; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #mynetwork { 
            width: 100vw; 
            height: 100vh; 
        }
      /* UI HUD Elements */
    #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #fff;
        z-index: 10;
        pointer-events: none;
        background: rgba(15, 15, 15, 0.7);
        padding: 15px;
        border-radius: 8px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 14px;
        line-height: 1.5;
    }
    
    #search-container {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        background: rgba(15, 15, 15, 0.7);
        padding: 10px;
        border-radius: 8px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
    }
    #searchBox {
        background: transparent;
        border: none;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        outline: none;
        width: 250px;
    }
    #searchBox::placeholder {
        color: rgba(255,255,255,0.5);
    }
    </style>
</head>
<body>

<div id="hud">
    <h3 style="margin: 0 0 10px 0; font-weight: 600;">File Search 69</h3>
    <span style="color: #888;">Live Structure Mapping</span><br>
    <div style="margin-top: 10px; font-size: 12px; color: #aaa;">
        • <span style="color: #ff3366;">Red nodes</span>: High entropy (hubs)<br>
        • <span style="color: #00ccff;">Blue nodes</span>: Low entropy (leaves)<br>
        • Click any node to copy full path
    </div>
</div>

<div id="search-container">
    <input type="text" id="searchBox" placeholder="🔍 Search files..." autocomplete="off">
</div>

<div id="mynetwork"></div>

<script type="text/javascript">
    function renderGraph(nodesData, edgesData) {
        // Store original properties so we can restore them after clearing search
        nodesData.forEach(function(n) {
            n.originalColor = n.color;
            n.originalSize = n.size || 10;
        });

        // Wait if the remote vis.js script is still downloading
        if (typeof vis === 'undefined') {
            document.getElementById('mynetwork').innerHTML = '<div style="padding: 50px; color: #0078D7;">Downloading physics engine (vis.js)... please wait a moment.</div>';
            setTimeout(function() { renderGraph(nodesData, edgesData); }, 500);
            return;
        }
        
        // Clear loading message
        document.getElementById('mynetwork').innerHTML = '';
        
        var container = document.getElementById('mynetwork');
        
        var data = {
            nodes: new vis.DataSet(nodesData),
            edges: new vis.DataSet(edgesData)
        };
        
        var options = {
            nodes: {
                shape: 'dot',
                size: 15,
                font: { 
                    color: '#ffffff', 
                    size: 12,
                    face: 'Segoe UI'
                },
                color: { 
                    background: '#0078D7', 
                    border: '#005A9E',
                    highlight: { background: '#ff9900', border: '#cc7a00' },
                    hover: { background: '#3399ff', border: '#0078D7' }
                },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                color: { color: '#555555', highlight: '#ff9900' },
                smooth: { type: 'continuous' },
                width: 1
            },
            physics: {
                solver: 'barnesHut',
                timestep: 0.3, // Lower timestep for a slower, smoother arranging animation
                barnesHut: {
                    gravitationalConstant: -2500, // Slightly stronger repulsion for dense nodes
                    centralGravity: 0.1,
                    springLength: 100, // Default, but overridden dynamically by python
                    springConstant: 0.04,
                    damping: 0.2, // Low damping for natural dance
                    avoidOverlap: 0 
                },
                stabilization: false // Set to false to show the live arranging animation
            },
            interaction: {
                hover: true,
                tooltipDelay: 200,
                zoomView: true,
                dragView: true
            }
        };
        
        var network = new vis.Network(container, data, options);
        
        var physicsTimer = null;
        
        // Function to lock physics to guarantee stability
        function lockPhysics() {
            network.setOptions({ physics: { enabled: false } });
        }
        
        // Initial load: Let the nodes dance and arrange slowly live for 15 seconds, then lock
        physicsTimer = setTimeout(lockPhysics, 15000);
        
        // When dragging starts, wake up the physics smoothly
        network.on("dragStart", function(params) {
            if (params.nodes.length > 0) {
                clearTimeout(physicsTimer);
                network.setOptions({ physics: { enabled: true } });
            }
        });
        
        // When dropping the node, let it dance smoothly into place for 8 seconds, then lock
        network.on("dragEnd", function(params) {
            clearTimeout(physicsTimer);
            physicsTimer = setTimeout(lockPhysics, 8000);
        });
        
        // Copy full path to clipboard when a node is clicked
        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                // Access the node data to get the full path stored in the 'title' attribute
                var clickedNode = data.nodes.get(nodeId);
                var fullPath = clickedNode.title;
                
                if (fullPath) {
                    // Use a hidden textarea to ensure copy works robustly inside the Qt Web Engine
                    var tempInput = document.createElement("textarea");
                    tempInput.value = fullPath;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    
                    // Show brief confirmation message in the HUD
                    var hud = document.getElementById('hud');
                    var msg = document.getElementById('copy-msg');
                    if (!msg) {
                        hud.innerHTML += '<p id="copy-msg" style="color: #00ff00; font-weight: bold; margin-top: 5px;">Path copied to clipboard!</p>';
                    }
                    setTimeout(function() {
                        var msgToRemove = document.getElementById('copy-msg');
                        if (msgToRemove) msgToRemove.remove();
                    }, 2000);
                }
            }
        });
        
        // Search functionality
        var searchBox = document.getElementById('searchBox');
        searchBox.addEventListener('input', function(e) {
            var query = e.target.value.toLowerCase();
            var updates = [];
            
            data.nodes.forEach(function(node) {
                var path = (node.title || "").toLowerCase();
                if (query === "") {
                    // Restore original state
                    updates.push({
                        id: node.id,
                        color: node.originalColor,
                        size: node.originalSize,
                        font: { color: '#ffffff' }
                    });
                } else if (path.includes(query)) {
                    // Highlight matching node
                    updates.push({
                        id: node.id,
                        color: { background: '#ffff00', border: '#ffaa00' },
                        size: Math.min(node.originalSize * 2, 40),
                        font: { color: '#ffffff' }
                    });
                } else {
                    // Dim non-matching node
                    var dimmedColor = "#333333";
                    updates.push({
                        id: node.id,
                        color: { background: dimmedColor, border: '#222222' },
                        size: node.originalSize,
                        font: { color: '#555555' }
                    });
                }
            });
            
            // Update the dataset in bulk
            data.nodes.update(updates);
        });
    }
</script>
</body>
</html>
